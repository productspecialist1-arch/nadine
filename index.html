<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important Question 💖</title>

  <style>
    body {
      text-align: center;
      background: pink;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
    }

    #noBtn {
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>Gaga, Will you go out with me? 💕</h1>

  <button id="yesBtn" onclick="yesClicked()">Yes 😍</button>
  <button id="noBtn" onclick="noClicked()" onmouseover="moveNo()">No 😢</button>

<script>
function yesClicked() {
  window.location.href = "yes.html";
}

let noCount = 0;

function noClicked() {
  noCount++;

  const messages = [
    "Are you sure? 🥺",
    "Really really sure? 😭",
    "Think again... 💔",
    "Last chance 😢",
    "You're breaking my heart 💔",
    "Okay that's illegal 😤",
    "You can't escape 😈"
  ];

  alert(messages[Math.min(noCount - 1, messages.length - 1)]);

  // Make YES button bigger each time
  const yesBtn = document.getElementById("yesBtn");
  yesBtn.style.transform = `scale(${1 + noCount * 0.2})`;
}

function moveNo() {
  const btn = document.getElementById("noBtn");

  const x = Math.random() * (window.innerWidth - btn.offsetWidth);
  const y = Math.random() * (window.innerHeight - btn.offsetHeight);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
